# am.conf — Agent Maestro vault configuration for vault-maintenance tools
# Overrides defaults.conf with AM-specific expectations.

vault_root: ""
output_dir: "reports"

# Structure expectations (structure_check.sh)
required_folders:
  - "01_CAPTURE"
  - "02_KNOWLEDGE"
  - "03_DECIDE"
  - "04_EXECUTE"
  - "05_RECORD"
  - "06_REFLECT"

required_root_files:
  - "CLAUDE.md"
  - "SYSTEM_MAP.md"

required_claude_md:
  - "01_CAPTURE/CLAUDE.md"
  - "02_KNOWLEDGE/CLAUDE.md"
  - "03_DECIDE/CLAUDE.md"
  - "04_EXECUTE/CLAUDE.md"
  - "05_RECORD/CLAUDE.md"
  - "06_REFLECT/CLAUDE.md"

# YAML validation (yaml_validation.sh)
frontmatter_optional_folders:
  - "01_CAPTURE"
  - "05_RECORD/logs"

required_fields:
  - "title"
  - "type"
  - "status"
  - "authority_weight"
  - "schema_version"
  - "created"
  - "updated"
  - "relationships"
  - "tags"

controlled_vocabulary:
  type:
    - "governance"
    - "concept"
    - "skill"
    - "role"
    - "pipeline"
    - "log"
    - "report"
    - "proposal"
  status:
    - "draft"
    - "active"
    - "archived"

authority_weight_range:
  min: 0
  max: 100

# Orphan detection (orphan_detection.sh)
structural_exemptions:
  - "CLAUDE.md"
  - "SYSTEM_MAP.md"
  - "README.md"

# Link validation (broken_links.sh)
wiki_link_required_types:
  - "governance"
  - "concept"

# Files and folders to exclude from all scans
exclude_patterns:
  - ".git"
  - ".obsidian"
  - ".trash"
  - "04_EXECUTE/tools/vault-maintenance/reports"
  - "04_EXECUTE/tools/vault-maintenance/logs"
  - "04_EXECUTE/runtime"
  - "05_RECORD/archive"
  - "05_RECORD/reports"
  - "02_KNOWLEDGE/templates"

# Folders exempt from orphan detection (leaf artifacts — produced, not referenced)
orphan_exempt_folders:
  - "01_CAPTURE"
  - "05_RECORD/logs"
  - "05_RECORD/reports"

# Folders exempt from stub detection (captures are allowed to be rough stubs)
stub_exempt_folders:
  - "01_CAPTURE"

# Pipeline enforcement — capture triage (capture_triage.py)
capture_triage_deadline_days: 14

# Pipeline enforcement — proposal lifecycle (proposal_lifecycle.py)
proposal_draft_folder: "03_DECIDE/proposals"
proposal_active_folder: "03_DECIDE/active"
roadmap_file: "02_KNOWLEDGE/governance/AM — Roadmap.md"

# Pipeline enforcement — concept lifecycle (concept_lifecycle.py)
concept_review_deadline_days: 30

# Pipeline enforcement — governance compliance (governance_compliance.py)
governance_folder: "02_KNOWLEDGE/governance"
governance_min_authority_weight: 70

# Type/folder mapping for consistency check (Check 17)
# Note: "report" is intentionally absent — reports appear in both 05_RECORD/reports/
# (tool-generated) and 06_REFLECT/ (reflections filed as type: report). Mapping
# report to a single folder would produce false positives on reflections.
type_folder_map:
  governance: "02_KNOWLEDGE/governance"
  concept: "02_KNOWLEDGE/concepts"
  skill: "02_KNOWLEDGE/skills"
  role: "02_KNOWLEDGE/governance/roles"
  proposal: "03_DECIDE"
  log: "05_RECORD/logs"

# Git hygiene (git_hygiene.py) — Wave 8.3
git_branch_patterns:
  - "^wave-\\d+\\.\\d+-[a-z0-9-]+$"
  - "^fix-[a-z0-9-]+$"
  - "^housekeeping-[a-z0-9-]+$"
stale_branch_threshold_days: 30
master_branch: "master"
master_commit_window: 50
pre_wave_tag_pattern: "^pre-wave-{wave_id}$"
git_tag_patterns:
  - "^pre-wave-\\d+\\.\\d+$"
  - "^pre-[a-z0-9-]+$"
  - "^v\\d+\\.\\d+\\.\\d+$"
commit_message_window: 50
commit_min_length: 5
commit_format_patterns:
  - "^SES-\\d{3}:"
  - "^Wave \\d+\\.\\d+:"
commit_reject_patterns:
  - "^(wip|stuff|updates|fixes|test|tmp|asdf)$"
check_uncommitted_changes: true

# Historical exceptions — Wave 8.3 debt items (documented in Wave 8.3 Reflection)
#
# Pre-wave tag exceptions: these completed waves predate the checkpoint tag
# convention. Tags cannot be retroactively created without misrepresenting
# when the checkpoint existed. Listed here so Check 4 skips them instead
# of reporting unfixable findings on every run.
pre_wave_tag_exceptions:
  - "5"
  - "5.1"
  - "5.2"
  - "7"
  - "8.1"

# Direct master commits: the branching convention was established by Wave 8.3,
# which merged on 2026-03-17. All direct commits in the history predate the
# convention. Check 3 skips commits before this date to avoid warning noise
# about historical state that cannot be changed. Set to 2026-03-18 because
# the convention effectively starts the day after Wave 8.3 merged.
master_commit_convention_start: "2026-03-18"
