# defaults.conf — Generic Obsidian vault defaults
# Conservative baseline for any vault. Override with a vault-specific config.

# Vault root (must be overridden per vault)
vault_root: ""
output_dir: "reports"

# Structure expectations (structure_check.sh)
required_folders: []
required_root_files: []
required_claude_md: []

# YAML validation (yaml_validation.sh)
frontmatter_optional_folders: []

required_fields:
  - "title"
  - "type"
  - "status"

controlled_vocabulary: {}

# Orphan detection (orphan_detection.sh)
structural_exemptions:
  - "CLAUDE.md"
  - "README.md"

# Link validation (broken_links.sh)
wiki_link_required_types: []

# Files and folders to exclude from all scans
exclude_patterns:
  - ".git"
  - ".obsidian"
  - ".trash"
