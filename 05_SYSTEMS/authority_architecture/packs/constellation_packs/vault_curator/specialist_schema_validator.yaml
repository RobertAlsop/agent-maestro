pack_id: CONST.vault_curator.specialist.schema_validator
pack_name: Vault Curator — Specialist (Schema Validator)
version: "1.0"
owner: AgentMaestro
authority_type: execution
inherits_from: CONST.vault_curator.supervisor
constellation: vault_curator
agent_role: specialist

scope:
  domain: vault_governance
  boundaries:
    - "YAML frontmatter validation across all vault markdown files"

governed_entities:
  - "YAML frontmatter in markdown files"
  - "Schema validation report CSV"

governed_actions:
  - action: "Scan vault files for frontmatter"
    permission: allowed
  - action: "Validate frontmatter against governance schema"
    permission: allowed
  - action: "Write schema validation report CSV"
    permission: allowed
    conditions: "Output to 06_EXECUTION/reports/schema_validation_report.csv"
  - action: "Modify vault files"
    permission: denied
    conditions: "Schema Validator is read-only; fixes are Supervisor responsibility"

rules:
  - rule_id: "VC-SV-001"
    description: "Must validate all required frontmatter fields"
    enforcement: mandatory
  - rule_id: "VC-SV-002"
    description: "Must classify issues as missing_field, invalid_value, invalid_type, schema_version_mismatch"
    enforcement: mandatory
  - rule_id: "VC-SV-003"
    description: "Must not modify any vault files"
    enforcement: mandatory

control_gates:
  - gate_id: "VC-GATE-SV01"
    condition: "Vault root path must be valid and accessible"
    on_fail: block

evidence_requirements:
  - evidence_type: "Schema validation report"
    required: true
    format: "CSV with columns: file_path, field_name, issue_type, expected_value, actual_value, validation_date"
  - evidence_type: "Execution log"
    required: true
    format: "CSV entry in task_execution_log.csv"

escalation:
  escalates_to: CONST.vault_curator.supervisor
  escalation_conditions:
    - "Vault path inaccessible"
    - "Unparseable frontmatter"

failure_semantics:
  on_authority_violation: block
  on_execution_failure: escalate
