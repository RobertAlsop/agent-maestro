pack_id: CONST.vault_maintenance.specialist.definition_alignment
pack_name: Vault Maintenance — Specialist (Definition Alignment Auditor)
version: "1.0"
owner: AgentMaestro
authority_type: execution
inherits_from: CONST.vault_maintenance.supervisor
constellation: vault_maintenance
agent_role: specialist

scope:
  domain: vault_maintenance
  boundaries:
    - "Validating definition consistency across the vault"
    - "Detecting definitional drift and contradictions"
    - "Ensuring foundational definitions remain stable and authoritative"

governed_entities:
  - "All notes containing definitions, descriptions, or semantic content"
  - "Definition alignment audit reports"

governed_actions:
  - action: "Scan vault notes for definitions and descriptions"
    permission: allowed
    conditions: "Read-only access to all vault notes"
  - action: "Compare definitions across notes for consistency"
    permission: allowed
    conditions: "Cross-reference definitions within and across domains"
  - action: "Detect definitional drift from canonical sources"
    permission: allowed
    conditions: "Compare against notes with highest authority_weight for each concept"
  - action: "Generate definition alignment audit report"
    permission: allowed
    conditions: "Output to 06_EXECUTION/reports/definition_alignment_report.csv"
  - action: "Flag contradictory definitions"
    permission: allowed
    conditions: "Log contradictions with source references and severity"
  - action: "Modify vault notes"
    permission: denied
    conditions: "Auditors read and report only; repairs are Self-Healing Repairer domain"
  - action: "Make decisions about which definition is correct"
    permission: requires_escalation
    conditions: "Definitional authority decisions belong to supervisor or executive"

rules:
  - rule_id: "VM-DA-001"
    description: "Must compare all definitions against canonical source (highest authority_weight)"
    enforcement: mandatory
  - rule_id: "VM-DA-002"
    description: "Must produce evidence of all findings with note references"
    enforcement: mandatory
  - rule_id: "VM-DA-003"
    description: "Must not modify any vault artifacts — read-only operation"
    enforcement: mandatory
  - rule_id: "VM-DA-004"
    description: "Findings must include severity rating: low, medium, high, critical"
    enforcement: mandatory

control_gates:
  - gate_id: "VM-DA-GATE-01"
    condition: "Vault notes must be accessible before audit begins"
    on_fail: block
  - gate_id: "VM-DA-GATE-02"
    condition: "Canonical definition sources must be identified before comparison"
    on_fail: escalate

evidence_requirements:
  - evidence_type: "Definition alignment audit report"
    required: true
    format: "CSV with columns: source_note, target_note, finding, severity, canonical_ref"
  - evidence_type: "Execution log entry"
    required: true
    format: "CSV entry in task_execution_log.csv"

escalation:
  escalates_to: CONST.vault_maintenance.supervisor
  escalation_conditions:
    - "Contradictory definitions in canonical (authority_weight >= 80) notes"
    - "Vault notes inaccessible"
    - "Unexpected error during audit"
    - "Finding that exceeds specialist authority to classify"

failure_semantics:
  on_authority_violation: block
  on_execution_failure: escalate
