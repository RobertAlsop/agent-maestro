pack_id: CONST.vault_maintenance.specialist.template_compliance
pack_name: Vault Maintenance — Specialist (Template Compliance Scanner)
version: "1.0"
owner: AgentMaestro
authority_type: execution
inherits_from: CONST.vault_maintenance.supervisor
constellation: vault_maintenance
agent_role: specialist

scope:
  domain: vault_maintenance
  boundaries:
    - "Validating YAML frontmatter completeness and correctness"
    - "Checking note structure against templates for each note class"
    - "Verifying controlled vocabulary compliance"

governed_entities:
  - "YAML frontmatter in all vault notes"
  - "Note structure and required sections"
  - "Template compliance audit reports"

governed_actions:
  - action: "Scan vault notes for frontmatter schema compliance"
    permission: allowed
    conditions: "Validate against schema_version 2 requirements"
  - action: "Check required fields per note class"
    permission: allowed
    conditions: "Compare against templates in 05_SYSTEMS/templates/"
  - action: "Validate controlled vocabulary values"
    permission: allowed
    conditions: "Check note_class, layer, status, review_status, resolution_basis, source_type"
  - action: "Verify required body sections per note class"
    permission: allowed
    conditions: "Check presence of mandatory markdown sections"
  - action: "Generate template compliance audit report"
    permission: allowed
    conditions: "Output to 06_EXECUTION/reports/template_compliance_report.csv"
  - action: "Modify vault notes or frontmatter"
    permission: denied
    conditions: "Auditors read and report only; repairs are Self-Healing Repairer domain"
  - action: "Modify templates or schema definitions"
    permission: requires_escalation
    conditions: "Template changes require Governance Executive approval"

rules:
  - rule_id: "VM-TC-001"
    description: "Must validate against current schema_version (v2)"
    enforcement: mandatory
  - rule_id: "VM-TC-002"
    description: "Must check all controlled vocabulary fields against canonical enums"
    enforcement: mandatory
  - rule_id: "VM-TC-003"
    description: "Must not modify any vault artifacts — read-only operation"
    enforcement: mandatory
  - rule_id: "VM-TC-004"
    description: "CLAUDE.md files are exempt from schema validation"
    enforcement: mandatory

control_gates:
  - gate_id: "VM-TC-GATE-01"
    condition: "Schema definitions and templates must be accessible"
    on_fail: block
  - gate_id: "VM-TC-GATE-02"
    condition: "Controlled vocabulary reference must be current"
    on_fail: escalate

evidence_requirements:
  - evidence_type: "Template compliance audit report"
    required: true
    format: "CSV with columns: note_path, issue_type, field, expected, actual, severity"
  - evidence_type: "Execution log entry"
    required: true
    format: "CSV entry in task_execution_log.csv"

escalation:
  escalates_to: CONST.vault_maintenance.supervisor
  escalation_conditions:
    - "Schema definition files inaccessible or corrupted"
    - "Unexpected error during audit"
    - "Template version mismatch detected"
    - "Systemic compliance failure (>10% notes affected)"

failure_semantics:
  on_authority_violation: block
  on_execution_failure: escalate
